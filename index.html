<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Invite – Hui Xin &amp; Sebastian</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fdf6ee;
      font-family: 'Georgia', serif;
      color: #4a3728;
    }

    /* ── Card ── */
    .invite-card {
      background: #fff;
      border: 2px solid #d4af7a;
      border-radius: 16px;
      padding: 48px 40px 40px;
      max-width: 540px;
      width: 92%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(212, 175, 122, 0.25);
    }

    /* ── Decorative rule ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #d4af7a;
      font-size: 1.1rem;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #d4af7a;
    }

    /* ── Text ── */
    .tagline {
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #b08850;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 2rem;
      font-weight: normal;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    h1 em {
      font-style: italic;
      color: #b08850;
    }

    .question {
      font-size: 1.1rem;
      line-height: 1.6;
      margin: 18px 0 24px;
      color: #5c4535;
    }

    /* ── Couple photo ── */
    .photo-wrapper {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 24px;
      border: 4px solid #d4af7a;
      box-shadow: 0 4px 16px rgba(212, 175, 122, 0.3);
      background: #f5ebe0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #c9a87c;
      font-size: 0.8rem;
    }

    .photo-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .photo-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 20px;
      color: #c9a87c;
    }

    .photo-placeholder svg {
      width: 56px;
      height: 56px;
      opacity: 0.6;
    }

    /* ── RSVP section ── */
    .rsvp-section {
      margin-top: 8px;
    }

    .rsvp-message {
      min-height: 40px;
      font-size: 1rem;
      color: #7a5c3a;
      margin-bottom: 20px;
      font-style: italic;
      transition: opacity 0.3s;
    }

    /* ── Buttons ── */
    .btn-group {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    .btn {
      padding: 12px 36px;
      border: none;
      border-radius: 30px;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 0.05em;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    }

    .btn-yes {
      background: #c9956c;
      color: #fff;
    }

    .btn-no {
      background: #fff;
      color: #c9956c;
      border: 2px solid #c9956c;
    }
  </style>
</head>
<body>
  <div class="invite-card">

    <p class="tagline">You are cordially invited</p>

    <div class="divider">❧</div>

    <h1>Hui Xin <em>&amp;</em> Sebastian</h1>

    <p class="question">
      Are you free on <strong>31 December 2025</strong> to celebrate<br />
      the wedding of <em>Hui Xin and Sebastian</em>?
    </p>

    <div class="photo-wrapper">
      <!--
        Replace the placeholder below with an <img> tag pointing to your photo, e.g.:
        <img src="couple.jpg" alt="Hui Xin and Sebastian" />
      -->
      <div class="photo-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"
             xmlns="http://www.w3.org/2000/svg">
          <path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402C1 3.134 4.498 1 7.5 1
                   c2.33 0 4.236 1.355 4.5 3.047C12.264 2.355 14.17 1 16.5 1
                   c3.002 0 6.5 2.134 6.5 6.191 0 4.105-5.37 8.863-11 14.402z"
                fill="currentColor" opacity="0.35"/>
          <circle cx="8.5" cy="9" r="2.5" stroke="currentColor" fill="none"/>
          <circle cx="15.5" cy="9" r="2.5" stroke="currentColor" fill="none"/>
        </svg>
        <span>Photo of us</span>
      </div>
    </div>

    <div class="rsvp-section">
      <p class="rsvp-message" id="rsvp-message"></p>

      <div class="btn-group" id="btn-group">
        <button class="btn btn-yes" id="btn-yes" onclick="handleYes()">Yes 🎉</button>
        <button class="btn btn-no"  id="btn-no"  onclick="handleNo()">No</button>
      </div>
    </div>

  </div>

  <script>
    // TODO: Replace with your actual RSVP / event-details URL before going live
    const RSVP_URL = 'https://forms.gle/your-rsvp-form';

    let noClickCount = 0;

    function handleYes() {
      window.location.href = RSVP_URL;
    }

    function handleNo() {
      noClickCount++;

      const message = document.getElementById('rsvp-message');

      if (noClickCount === 1) {
        // First "No" – ask for confirmation
        message.textContent = 'Are you sure? 🥺';
      } else if (noClickCount === 2) {
        // Second "No" – playfully insist they are coming
        message.textContent = 'Yes I am coming! 🎊';
      } else {
        // Third "No" – redirect to RSVP site
        window.location.href = RSVP_URL;
      }
    }
  </script>
</body>
</html>
